<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <meta name="description" content="Log in to manage Free Food Map locations, reports, events, or volunteer signups.">
    <link rel="stylesheet" href="https://use.typekit.net/jjw8ped.css">
    <link rel="stylesheet" href="/static/styles/foodmap.css">
</head>

<body>
<div class="page-shell">
    <header class="site-header">
        <a class="brand" href="/">Free Food Map</a>
        <nav class="nav-links" aria-label="Main navigation">
            <a href="/map">Map</a>
            <a href="/suggest-location">Suggest Location</a>
            {% if session.user_id %}
                <a class="danger" href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
                <a href="/register">Sign Up</a>
            {% endif %}
        </nav>
    </header>

    <main class="content">
        <section class="panel form-page">
            <div class="intro-block">
                <h1>Log In</h1>
            </div>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST" class="form-grid">
                <div class="field">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           placeholder="you@example.com"
                           required>
                </div>

                <div class="field">
                    <label>Password</label>
                    <input type="password"
                           id="password"
                           name="password"
                           required>
                </div>

                <label class="checkbox-line">
                    <input type="checkbox" id="show-password">
                    Show password
                </label>

                <button type="submit" class="btn-primary">Log In</button>
            </form>

            <p style="text-align: center; margin-bottom: 0;">
                Need access? <a href="/register">Request an account</a>.
                New accounts are reviewed before approval.
            </p>
        </section>
    </main>
</div>

<script>
    const toggle = document.getElementById("show-password");
    const password = document.getElementById("password");

    toggle.addEventListener("change", () => {
        password.type = toggle.checked ? "text" : "password";
    });
</script>
</body>
</html>
